<!DOCTYPE html>
<html>
<head>
<title>Armstrong Number</title>
</head>
<body>

<script>

const number = Number(prompt("Enter a number:"));

let temp = number;
let sum = 0;

while (temp > 0) {
const digit = temp % 10;
sum += digit ** 3;
temp = Math.floor(temp / 10);
}

if (sum === number) {
document.write("<h2>" + number + " is an ARMSTRONG NUMBER</h2>");
}
else {
document.write("<h2>" + number + " is NOT an ARMSTRONG NUMBER</h2>");
}

</script>

</body>
</html>
