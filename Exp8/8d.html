<!DOCTYPE html>
<html>
<head>
<title>Object Loops</title>
</head>
<body>

<script>

const person = {
name: "John",
age: 25,
city: "Delhi"
};

document.write("<h3>for-in Loop</h3>");
for (let key in person) {
document.write(key + ": " + person[key] + "<br>");
}

document.write("<h3>for-of Loop (Object Values)</h3>");
for (let value of Object.values(person)) {
document.write(value + "<br>");
}

document.write("<h3>forEach Loop</h3>");
Object.entries(person).forEach(entry => {
document.write(entry[0] + ": " + entry[1] + "<br>");
});

</script>

</body>
</html>
