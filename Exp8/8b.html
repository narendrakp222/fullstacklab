<!DOCTYPE html>
<html>
<head>
<title>Week Days</title>
</head>
<body>

<script>

const dayNumber = Number(prompt("Enter day number (1-7):"));

let day;

switch(dayNumber) {

case 1:
day = "Sunday";
break;

case 2:
day = "Monday";
break;

case 3:
day = "Tuesday";
break;

case 4:
day = "Wednesday";
break;

case 5:
day = "Thursday";
break;

case 6:
day = "Friday";
break;

case 7:
day = "Saturday";
break;

default:
day = "Invalid Day";

}

document.write("<h2>" + day + "</h2>");

</script>

</body>
</html>
