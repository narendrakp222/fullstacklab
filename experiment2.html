<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HTML Hyperlinks Example</title>
</head>
<body>

<h1>HTML Hyperlinks Example</h1>

<h2>External Link</h2>
<a href="https://www.google.com" target="_blank" rel="noopener">
    Go to Google
</a>

<h2>Internal Page Navigation</h2>
<a href="#section2">Go to Section 2</a>

<h2 id="section2">Section 2</h2>
<p>
    This is Section 2. You came here from the hyperlink above.
</p>

<h2>Download File</h2>
<a href="example.pdf" download="ExampleFile.pdf">
    Download PDF
</a>

</body>
</html>
