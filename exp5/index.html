<body>

<h1>CSS Color Reference Methods</h1>

<p class="colorname">This text uses Color Name.</p>
<p class="hexcolor">This text uses HEX Value.</p>
<p class="rgbcolor">This text uses RGB Value.</p>
<p class="rgbacolor">This text uses RGBA Value.</p>
<p class="hslcolor">This text uses HSL Value.</p>
<p class="hslacolor">This text uses HSLA Value.</p>

</body>
