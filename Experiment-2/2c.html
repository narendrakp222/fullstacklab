<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
</head>
<body>

<h2>Registration Form</h2>

<form action="#" method="post">
<table border="1" cellpadding="5" cellspacing="0">

<tr>
<td>Full Name:</td>
<td><input type="text" name="fullname" required placeholder="Enter your full name"></td>
</tr>

<tr>
<td>Password:</td>
<td><input type="password" name="password" placeholder="Enter Your Password" required></td>
</tr>

<tr>
<td>Age:</td>
<td><input type="number" name="age" min="1" max="120" placeholder="Enter Your Age" max="120" required></td>
</tr>

<tr>
<td>Date of Birth:</td>
<td><input type="date" name="dob" required></td>
</tr>

<tr>
<td>Gender:</td>
<td>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other
</td>
</tr>

<tr>
<td>Hobbies:</td>
<td>
<input type="checkbox"> Reading
<input type="checkbox"> Traveling
<input type="checkbox"> Sports
<input type="checkbox"> Music
</td>
</tr>

<tr>
<td>Country:</td>
<td>
<select>
<option>Select Country</option>
<option>USA</option>
<option>UK</option>
<option>India</option>
<option>Australia</option>
<option>Canada</option>
</select>
</td>
</tr>

<tr>
<td>About Yourself:</td>
<td><textarea rows="4" cols="30"></textarea></td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</td>
</tr>

</table>
</form>

</body>
</html>
