<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>
<body>

<h2>HTML Table</h2>

<table border="2" cellpadding="10">

<tr>
    <th>Student Name</th>
    <th>Subject</th>
    <th>Marks</th>
    <th>Remarks</th>
</tr>

<tr>
    <td>John</td>
    <td>Math</td>
    <td>85</td>
    <td>Good</td>
</tr>

<tr>
    <td>Mary</td>
    <td colspan="2">Science</td>
    <td>Excellent</td>
</tr>

<tr>
    <td rowspan="2">Alex</td>
    <td>English</td>
    <td>78</td>
    <td>Average</td>
</tr>

<tr>
    <td>History</td>
    <td>92</td>
    <td>Very Good</td>
</tr>

</table>

</body>
</html>
