<!DOCTYPE html>
<html>
<head>
<title>Combinator Selectors</title>

<style>

/* Descendant */
div p {
 color: blue;
}

/* Child */
div > h3 {
 color: red;
}

/* Adjacent Sibling */
h4 + p {
 color: green;
}

/* General Sibling */
h5 ~ p {
 color: purple;
}

</style>
</head>

<body>

<div>
 <p>Descendant Selector</p>
 <h3>Child Selector</h3>
</div>

<h4>Adjacent Example</h4>
<p>This is adjacent sibling</p>

<h5>General Sibling Example</h5>
<p>Sibling 1</p>
<p>Sibling 2</p>

</body>
</html>
