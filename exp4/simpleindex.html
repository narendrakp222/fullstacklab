<!DOCTYPE html>
<html>
<head>
<title>Simple Selectors</title>

<style>

/* Universal Selector */
* {
 font-family: Arial;
}

/* Element Selector */
p {
 color: blue;
}

/* ID Selector */
#heading {
 color: red;
}

/* Class Selector */
.box {
 background-color: lightgray;
}

/* Group Selector */
h2, h3 {
 color: green;
}

</style>
</head>

<body>

<h1 id="heading">ID Selector Example</h1>
<h2>Group Selector Example</h2>
<h3>Another Group Selector Example</h3>

<p>This paragraph uses Element Selector</p>

<div class="box">
 This div uses Class Selector.
</div>

</body>
</html>
