<!DOCTYPE html>
<html>
<head>
<title>Pseudo-element Selector</title>

<style>

/* First Letter */
p::first-letter {
 font-size: 30px;
 color: red;
}

/* First Line */
p::first-line {
 color: blue;
}

</style>
</head>

<body>

<h2>Pseudo-element Selector Example</h2>

<p>
This paragraph demonstrates pseudo-element selectors.
The first letter will be large and red.
The first line will appear blue.
</p>

</body>
</html>
