<!DOCTYPE html>
<html>
<head>
<title>Pseudo-class Selector</title>

<style>

/* Hover */
a:hover {
 color: red;
}

/* Focus */
input:focus {
 background-color: lightyellow;
}

/* First Child */
p:first-child {
 color: blue;
}

</style>
</head>

<body>

<div>
 <p>First Child Paragraph</p>
 <p>Normal Paragraph</p>
</div>

<br>

<a href="#">Hover Over Me</a>

<br><br>

<input type="text" placeholder="Click here">

</body>
</html>
