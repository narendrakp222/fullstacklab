<!DOCTYPE html>
<html>
<head>
<title>JavaScript Output Methods</title>
</head>
<body>

<h2>JavaScript Output Methods</h2>
<p id="demo"></p>

<script>

document.write("Output using document.write() <br>");

document.getElementById("demo").innerHTML =
"Output using innerHTML <br>";

alert("Output using alert()");

console.log("Output using console.log()");

</script>

</body>
</html>
