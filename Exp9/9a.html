<!DOCTYPE html>
<html>
<head>
<title>Functions Example</title>
</head>
<body>

<script>

const number = Number(prompt("Enter a number:"));

function factorial(n) {
let fact = 1;
for (let i = 1; i <= n; i++) {
fact *= i;
}
return fact;
}

function fibonacci(n) {
let a = 0, b = 1;
let series = "";
while (a <= n) {
series += a + " ";
let temp = a + b;
a = b;
b = temp;
}
return series;
}

function primeNumbers(n) {
let result = "";
for (let i = 2; i <= n; i++) {
let isPrime = true;
for (let j = 2; j <= Math.sqrt(i); j++) {
if (i % j === 0) {
isPrime = false;
break;
}
}
if (isPrime) result += i + " ";
}
return result;
}

function isPalindrome(n) {
const reversed = n.toString().split("").reverse().join("");
return n.toString() === reversed;
}

document.write("Factorial: " + factorial(number) + "<br>");
document.write("Fibonacci: " + fibonacci(number) + "<br>");
document.write("Prime Numbers: " + primeNumbers(number) + "<br>");
document.write("Palindrome: " + (isPalindrome(number) ? "Yes" : "No"));

</script>

</body>
</html>
