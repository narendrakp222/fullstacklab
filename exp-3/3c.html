<!DOCTYPE html>
<html>
<head>
<title>Simple CSS Example</title>

<!-- Internal CSS -->
<style>
h2 { /* Selector: h2, Property: color, Value: blue */
 color: blue;
}
</style>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Inline CSS -->
<p style="color: red;">This is Inline CSS</p>

<h2>This is Internal CSS</h2>

<h3>This is External CSS</h3>

</body>
</html>
