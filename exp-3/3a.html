<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semantic HTML tags</title>
</head>

<body>

<header>
<h1>Semantic HTML Example</h1>
<span>Demonstration of HTML5 semantic elements</span>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<main>

<section>

<article>
<h2>Article Section</h2>
<p>This article explains the use of semantic HTML tags</p>

<figure>
<img src="/images (1).jpg" alt="Sample image" width="150">
<figcaption>Sample image with description</figcaption>
</figure>

<div>
<p>This is a <span>span element</span> inside a div container</p>
</div>

</article>

</section>

<aside>
<h3>Aside section</h3>
<p>This aside contains related information</p>
</aside>

</main>

<footer>
<p>© 2026 HTML lab program</p>
</footer>

</body>
</html>
