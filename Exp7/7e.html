<!DOCTYPE html>
<html>
<head>
<title>String Object</title>
</head>
<body>

<h2>String Object Example</h2>

<script>

const text = "JavaScript Programming";

document.write("Length: " + text.length + "<br>");

document.write("Uppercase: " + text.toUpperCase() + "<br>");

document.write("Substring: " + text.substring(0, 10) + "<br>");

document.write("Index of Script: " + text.indexOf("Script"));

</script>

</body>
</html>
