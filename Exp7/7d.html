<!DOCTYPE html>
<html>
<head>
<title>Math Object</title>
</head>
<body>

<h2>Math Object Example</h2>

<script>

document.write("PI: " + Math.PI + "<br>");
document.write("Square Root of 16: " + Math.sqrt(16) + "<br>");
document.write("Random: " + Math.random() + "<br>");
document.write("Maximum: " + Math.max(10, 20, 30));

</script>

</body>
</html>
