<!DOCTYPE html>
<html>
<head>
<title>Date Object</title>
</head>
<body>

<h2>Date Object Example</h2>

<script>

const today = new Date();

document.write("Current Date: " + today.toDateString() + "<br>");

document.write("Current Time: " + today.toLocaleTimeString() + "<br>");

document.write("Year: " + today.getFullYear());

</script>

</body>
</html>
