<!DOCTYPE html>
<html>
<head>
<title>RegExp Object</title>
</head>
<body>

<h2>RegExp Example</h2>

<script>

const pattern = /Java/;

const text = "JavaScript is powerful";

document.write("Match Found: " + pattern.test(text) + "<br>");

document.write("Search Position: " + text.search(pattern));

</script>

</body>
</html>
