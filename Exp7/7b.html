<!DOCTYPE html>
<html>
<head>
<title>Window Object</title>
</head>
<body>

<h2>Window Object Example</h2>

<button onclick="showInfo()">Show Info</button>

<script>

function showInfo() {
alert("Window Width: " + window.innerWidth);
console.log("Window Height: " + window.innerHeight);
}

</script>

</body>
</html>
