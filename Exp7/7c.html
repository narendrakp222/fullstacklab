<!DOCTYPE html>
<html>
<head>
<title>Array Object</title>
</head>
<body>

<h2>Array Object Example</h2>

<script>

const fruits = ["Apple", "Banana", "Mango"];

fruits.push("Orange");

fruits.pop();

document.write("Length: " + fruits.length + "<br>");

document.write("Joined: " + fruits.join(", "));

</script>

</body>
</html>
